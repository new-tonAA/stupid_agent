  <text x="400" y="56" text-anchor="middle" font-size="10" fill="#3a3f60" font-family="sans-serif">LLM-Driven Multi-Agent Software Testing Pipeline  ·  面向 C 语言程序的系统级功能测试</text>

  <!-- ═══ LANE BACKGROUNDS ═══ -->
  <rect x="16"  y="70" width="110" height="390" rx="10" fill="#16192610" stroke="#2e315040" stroke-width="1"/>
