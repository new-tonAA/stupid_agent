  <text x="327" y="85" text-anchor="middle" font-size="8" fill="#38c9d4" font-family="sans-serif" letter-spacing="0.05em">STATIC AGENT</text>
  <text x="457" y="85" text-anchor="middle" font-size="8" fill="#a78bfa" font-family="sans-serif" letter-spacing="0.05em">PLANNER AGENT</text>
